<style>
  :root { color-scheme: dark; }
  html, body { background: #080312; color: #F5F0FF; }
  body {

  }
  .font-display { font-family: "Crimson Pro", Georgia, serif; letter-spacing: -0.018em; }
  .num { font-variant-numeric: tabular-nums; }
  .arabic { font-family: "Noto Naskh Arabic", Amiri, serif; direction: rtl; line-height: 1.9; }

  /* Glass cards */
  .card-glass {

    border: 1px solid rgba(169,112,255,0.12);

  /* Buttons */

  .btn-gold {
    background: linear-gradient(160deg, #D9BD85 0%, #C9A86A 100%);
    color: #190B38;
    box-shadow: 0 1px 0 rgba(255,255,255,0.35) inset, 0 12px 32px -12px rgba(201,168,106,0.45);

  .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 16px 40px -10px rgba(201,168,106,0.6); }
  .btn-ghost { background: rgba(169,112,255,0.06); color: #F5F0FF; border: 1px solid rgba(169,112,255,0.18); }
  .btn-ghost:hover { background: rgba(169,112,255,0.11); border-color: rgba(169,112,255,0.32); }

  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 999px; font-size: 12.5px; font-weight: 500; }
  .chip-violet { background: rgba(124,77,255,0.18); color: #C5A0FF; border: 1px solid rgba(124,77,255,0.28); }
  .chip-gold { background: rgba(201,168,106,0.16); color: #E8D0A0; border: 1px solid rgba(201,168,106,0.28); }
  .chip-glass { background: rgba(169,112,255,0.06); color: #B8AACC; border: 1px solid rgba(169,112,255,0.16); }

  /* Focus */
  :focus-visible { outline: 2px solid #D4A574; outline-offset: 2px; border-radius: 8px; }

  /* Decorative arabesque dot pattern */
  .pattern-stars {
    background-image: radial-gradient(circle, rgba(169,112,255,0.14) 1px, transparent 1.5px);
    background-size: 28px 28px;
  }
  .pattern-zellige {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 80 80'><g fill='none' stroke='%23B294FF' stroke-opacity='0.12' stroke-width='1'><path d='M40 0 L60 20 L40 40 L20 20 Z'/><path d='M40 40 L60 60 L40 80 L20 60 Z'/><path d='M0 40 L20 20 L20 60 Z'/><path d='M80 40 L60 20 L60 60 Z'/></g></svg>");
  }
  .divider-arabesque {
    height: 24px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='48' height='24' viewBox='0 0 48 24'><g fill='none' stroke='%23D4A574' stroke-opacity='0.4' stroke-width='1'><path d='M0 12 L48 12'/><circle cx='24' cy='12' r='5'/><circle cx='24' cy='12' r='2.4'/></g></svg>");
    background-repeat: repeat-x;
    background-position: center;
  }

  /* Reveal animations */
  .reveal { opacity: 0; transform: translateY(14px); transition: opacity .6s ease, transform .6s ease; }
  .reveal.in { opacity: 1; transform: none; }
  .reveal-stagger > * { opacity: 0; transform: translateY(10px); transition: opacity .5s ease, transform .5s ease; }
  .reveal-stagger.in > * { opacity: 1; transform: none; }
  .reveal-stagger.in > *:nth-child(1) { transition-delay: 0ms; }
  .reveal-stagger.in > *:nth-child(2) { transition-delay: 60ms; }
  .reveal-stagger.in > *:nth-child(3) { transition-delay: 120ms; }
  .reveal-stagger.in > *:nth-child(4) { transition-delay: 180ms; }
  .reveal-stagger.in > *:nth-child(5) { transition-delay: 240ms; }
  .reveal-stagger.in > *:nth-child(6) { transition-delay: 300ms; }
  .reveal-stagger.in > *:nth-child(7) { transition-delay: 360ms; }
  .reveal-stagger.in > *:nth-child(8) { transition-delay: 420ms; }

  .word-reveal span { display: inline-block; opacity: 0; transform: translateY(0.4em); transition: opacity .6s ease, transform .6s ease; }
  .word-reveal.in span { opacity: 1; transform: none; }
  .word-reveal.in span:nth-child(1) { transition-delay: 0ms; }
  .word-reveal.in span:nth-child(2) { transition-delay: 70ms; }
  .word-reveal.in span:nth-child(3) { transition-delay: 140ms; }
  .word-reveal.in span:nth-child(4) { transition-delay: 210ms; }
  .word-reveal.in span:nth-child(5) { transition-delay: 280ms; }
  .word-reveal.in span:nth-child(6) { transition-delay: 350ms; }
  .word-reveal.in span:nth-child(7) { transition-delay: 420ms; }

  /* Page transition */
  .page-enter { animation: pageIn .4s ease both; }
  @keyframes pageIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* Modal */
  .modal-back { backdrop-filter: blur(12px) saturate(140%); }
  .modal-pop { animation: pop .25s cubic-bezier(.2,.8,.2,1); }
  @keyframes pop { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: none; } }
  .toast-slide { animation: toastIn .25s cubic-bezier(.2,.8,.2,1); }
  @keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  /* Hover lift */
  .hov-lift { transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease; }
  .hov-lift:hover { transform: translateY(-2px); border-color: rgba(180,150,255,0.28); box-shadow: 0 24px 60px -22px rgba(139,92,246,0.45); }

  .nice-scroll::-webkit-scrollbar-thumb { background: rgba(180,150,255,0.2); border-radius: 4px; }
  .nice-scroll::-webkit-scrollbar-track { background: transparent; }
  .no-scrollbar::-webkit-scrollbar { display: none; }

  .clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .clamp-4 { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

  /* Splash screen */
  #splash { position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(800px 400px at 60% -5%,rgba(124,77,255,0.22),transparent 60%),#080312;transition:opacity 0.55s ease;pointer-events:none; }
  #splash img { width:54px;height:54px;border-radius:14px;animation:splashPulse 2s ease-in-out infinite; }
  #splash .splash-name { font-family:"Crimson Pro",Georgia,serif;font-size:26px;font-weight:600;color:#F5F0FF;margin-top:14px;letter-spacing:-0.02em; }
  #splash .splash-arabic { font-family:"Noto Naskh Arabic",Amiri,serif;font-size:17px;color:#D9BD85;margin-top:6px;direction:rtl; }
  #splash .splash-dots { display:flex;gap:7px;margin-top:22px; }
  #splash .splash-dots span { width:6px;height:6px;border-radius:50%;background:rgba(169,112,255,0.55);animation:splashDot 1.3s ease-in-out infinite; }
  #splash .splash-dots span:nth-child(2) { animation-delay:.2s; }
  #splash .splash-dots span:nth-child(3) { animation-delay:.4s; }
  @keyframes splashPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.75;transform:scale(.93)} }
  @keyframes splashDot { 0%,100%{opacity:.25;transform:scale(.75)} 50%{opacity:1;transform:scale(1.25)} }

  /* Locked content blur */
  .locked-preview { filter: blur(6px); pointer-events: none; user-select: none; }
  .locked-overlay {
    background: linear-gradient(180deg, transparent 0%, rgba(10,4,28,0.5) 30%, rgba(10,4,28,0.92) 70%, rgba(10,4,28,0.98) 100%);

  /* Section */

  .container-x { max-width: 1240px; margin: 0 auto; padding: 0 24px; }
  @media (max-width: 640px) { .container-x { padding: 0 20px; } }

  /* Nav link underline */
  .nav-link { position: relative; }
  .nav-link::after { content: ''; position: absolute; left: 14px; right: 14px; bottom: 6px; height: 2px; background: linear-gradient(90deg, #A970FF, transparent); transform: scaleX(0); transform-origin: left; transition: transform .25s ease; }
  .nav-link:hover::after, .nav-link.active::after { transform: scaleX(1); }

  /* Code input cells */
  .code-input { font-family: "JetBrains Mono", monospace; letter-spacing: 0.18em; text-align: center; text-transform: uppercase; }

  /* Locked content blur */
  .locked-preview { filter: blur(6px); pointer-events: none; user-select: none; }

    background: linear-gradient(180deg, transparent 0%, rgba(8,3,18,0.5) 30%, rgba(8,3,18,0.92) 70%, rgba(8,3,18,0.98) 100%);

  /* Star rating */

  .gradient-text { background: linear-gradient(135deg, #DBC8FF 0%, #C9A86A 55%, #A970FF 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
</style>
